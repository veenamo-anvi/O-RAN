<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>O-RAN Live Map — Malleswaram</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --bg:#0f1419; --panel:#1a2029; --line:#2a3340; --muted:#8b97a7; --txt:#e6edf3;
            --blue:#2f81f7; --green:#2ca02c; --purple:#9467bd; --orange:#ff7f0e; --red:#e8000d; --amber:#ffb000; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,sans-serif; display:flex; height:100vh; color:var(--txt); }
    #map { flex:1; min-width:200px; }

    /* drag handle to stretch the side panel left/right */
    #resizer { flex:0 0 6px; cursor:col-resize; background:var(--line); position:relative; }
    #resizer:hover, #resizer.drag { background:var(--blue); }
    #resizer::after { content:"⋮"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-size:14px; }

    #side { width:400px; flex:0 0 auto; display:flex; flex-direction:column; background:var(--panel); min-width:300px; max-width:800px; }
    #controls { padding:10px 12px; border-bottom:1px solid var(--line); font-size:12.5px; }
    #controls strong { color:var(--muted); font-weight:600; margin-right:6px; }
    #controls label { margin-right:8px; cursor:pointer; white-space:nowrap; }
    #controls .row { display:flex; flex-wrap:wrap; gap:4px 0; align-items:center; }
    #controls .row + .row { margin-top:6px; }
    .swatch { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:3px; vertical-align:middle; }
    #status { padding:8px 12px; background:#11161d; font-size:12px; border-bottom:1px solid var(--line); color:var(--muted); }
    #status b { color:var(--txt); }

    /* chat */
    #chat { flex:1; display:flex; flex-direction:column; min-height:0; }
    #chead { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--line); }
    #chead .t { font-weight:600; font-size:13px; }
    #chead .t small { color:var(--muted); font-weight:400; margin-left:6px; }
    #chead .acts { display:flex; gap:6px; }
    #chead button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; line-height:1; }
    #chead button:hover { color:var(--txt); border-color:var(--muted); }
    #toggle { min-width:26px; text-align:center; }

    /* collapse: dock the chat to a header bar at the bottom, give the map/filters more room */
    #grow { display:none; }
    .chat-collapsed #grow { display:block; flex:1; }
    .chat-collapsed #chat { flex:0 0 auto; border-top:1px solid var(--line); }
    .chat-collapsed #log, .chat-collapsed #chips, .chat-collapsed #inp { display:none; }

    #log { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; font-size:13px; line-height:1.5; }
    .msg { display:flex; }
    .msg.user { justify-content:flex-end; }
    .bubble { max-width:85%; padding:8px 11px; border-radius:12px; white-space:normal; word-wrap:break-word; }
    .user .bubble { background:var(--blue); color:#fff; border-bottom-right-radius:3px; }
    .bot .bubble { background:#222b36; border:1px solid var(--line); border-bottom-left-radius:3px; }
    .bot .bubble b { color:#fff; }
    .bot .bubble ul { margin:4px 0; padding-left:18px; }
    .tool { display:inline-flex; align-items:center; gap:5px; background:#1b2733; border:1px solid #2d4a6b;
            color:#7fb3ff; border-radius:20px; padding:2px 9px; font-size:11px; margin:2px 4px 2px 0; }
    .tool .dot { width:6px; height:6px; border-radius:50%; background:#7fb3ff; }
    .note { color:var(--muted); font-size:11px; font-style:italic; margin-top:4px; }
    .typing span { display:inline-block; width:6px; height:6px; margin:0 1px; background:var(--muted); border-radius:50%; animation:bl 1s infinite; }
    .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bl { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    #chips { display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px 0; }
    #chips button { background:#222b36; border:1px solid var(--line); color:var(--muted); border-radius:20px; padding:4px 10px; font-size:11.5px; cursor:pointer; }
    #chips button:hover { color:var(--txt); border-color:var(--blue); }
    #inp { display:flex; gap:8px; padding:10px 12px 12px; align-items:flex-end; }
    #inp textarea { flex:1; background:#11161d; border:1px solid var(--line); color:var(--txt); border-radius:8px;
                    padding:10px 12px; font-size:14px; line-height:1.5; outline:none; resize:vertical; overflow-y:auto;
                    min-height:92px; max-height:280px; font-family:inherit; }
    #inp textarea:focus { border-color:var(--blue); }
    #inp button { background:var(--blue); border:0; color:#fff; border-radius:8px; height:40px; padding:0 16px; font-size:13px; cursor:pointer; font-weight:600; }
    #inp button:disabled { opacity:.5; cursor:default; }
    .leaflet-popup-content { font-size:12px; line-height:1.45; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="resizer" title="Drag to resize"></div>
  <div id="side">
    <div id="controls">
      <div class="row"><strong>Gen</strong>
        <label><input type="checkbox" id="g5" checked> 5G</label>
        <label><input type="checkbox" id="g4" checked> 4G</label>
      </div>
      <div class="row"><strong>Vendor</strong>
        <label><input type="checkbox" class="vf" value="Nokia" checked><span class="swatch" style="background:var(--blue)"></span>Nokia</label>
        <label><input type="checkbox" class="vf" value="Ericsson" checked><span class="swatch" style="background:var(--green)"></span>Ericsson</label>
        <label><input type="checkbox" class="vf" value="Samsung" checked><span class="swatch" style="background:var(--purple)"></span>Samsung</label>
        <label><input type="checkbox" class="vf" value="ZTE" checked><span class="swatch" style="background:var(--orange)"></span>ZTE</label>
      </div>
    </div>
    <div id="status">loading…</div>
    <div id="grow"></div>
    <div id="chat">
      <div id="chead">
        <div class="t">AI Operator<small id="be">connecting…</small></div>
        <div class="acts">
          <button id="clear">New chat</button>
          <button id="toggle" title="Collapse chat" aria-label="Toggle chat">▾</button>
        </div>
      </div>
      <div id="log"></div>
      <div id="chips"></div>
      <div id="inp"><textarea id="msg" rows="3" placeholder="Ask about the network…  (Enter to send · Shift+Enter for newline)"></textarea><button id="send">Send</button></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const VENDOR_COLOR = { Nokia:'#2f81f7', Ericsson:'#2ca02c', Samsung:'#9467bd', ZTE:'#ff7f0e' };
    const SHORTCUTS = {
      '/status':'What is the current status of all cells, DUs, and CUs? Summarise in a table.',
      '/alerts':'Show me all recent KPI alerts from the last 60 minutes.',
      '/cells':'List all cells with their current connected UEs, PRB utilisation, and DU assignment.',
      '/plan':'Generate a network plan for Malleswaram with default parameters and show me a summary.',
      '/son':'Show me the recent SON autonomous actions and their outcomes.',
      '/ue':'Show me UE usage and mobility events from the last 30 minutes.'
    };
    let SESSION = 'map-' + Math.random().toString(36).slice(2,9);

    /* ---------- map ---------- */
    const map = L.map('map').setView([13.004,77.570],14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      { maxZoom:19, attribution:'&copy; OpenStreetMap, &copy; CARTO' }).addTo(map);
    let layer = L.layerGroup().addTo(map);

    function allowed(c){
      if(c.generation==='5G' && !g5.checked) return false;
      if(c.generation==='4G' && !g4.checked) return false;
      return [...document.querySelectorAll('.vf:checked')].map(x=>x.value).includes(c.vendor);
    }
    async function refresh(){
      let data; try{ data=await (await fetch('/api/cells')).json(); }
      catch(e){ status.textContent='controller unreachable'; return; }
      if(!data.cells){ status.textContent=data.error||'no data'; return; }
      layer.clearLayers(); let ov=0,sl=0,ues=0;
      data.cells.filter(allowed).forEach(c=>{
        const k=c.kpi||{}, prb=+k.prb_dl_pct||0, sinr=+k.sinr_db||99;
        let fill=VENDOR_COLOR[c.vendor]||'#888';
        if(prb>85){fill='#e8000d';ov++;} else if(sinr<5){fill='#ffb000';sl++;}
        ues+=(+k.connected_ues||0);
        L.circle([c.lat,c.lon],{radius:c.coverage_radius_m,color:VENDOR_COLOR[c.vendor]||'#888',
          fillColor:fill,fillOpacity:c.generation==='5G'?0.5:0.2,weight:1})
          .bindPopup(`<b>${c.id}</b> (${c.area})<br>${c.vendor} ${c.hardware_model}<br>`+
            `${c.generation} ${c.band} · PCI ${c.pci} · DU ${c.du_id}<br>`+
            `UEs ${k.connected_ues??'-'} · PRB ${k.prb_dl_pct??'-'}% · SINR ${k.sinr_db??'-'}dB<br>`+
            `RSRP ${k.rsrp_dbm??'-'} · ${k.power_w??'-'}W · ${k.dl_throughput_mbps??'-'}Mbps · ~${Math.round(c.coverage_radius_m)}m`)
          .addTo(layer);
      });
      status.innerHTML=`<b>${data.total}</b> cells · shown <b>${data.cells.filter(allowed).length}</b> · `+
        `UEs <b>${ues}</b> · <span style="color:var(--red)">overloaded ${ov}</span> · <span style="color:var(--amber)">SINR-low ${sl}</span>`;
    }
    document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('change',refresh));

    /* ---------- chat ---------- */
    const log=document.getElementById('log'), msg=document.getElementById('msg'), sendBtn=document.getElementById('send');
    function esc(s){ return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function render(raw){
      // tool markers -> chips, mock/italic note -> muted, **bold**, "- " bullets
      const html=[]; let bullets=[];
      const flush=()=>{ if(bullets.length){ html.push('<ul>'+bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul>'); bullets=[]; } };
      raw.split('\n').forEach(line=>{
        let t=line.trim(); if(!t){ flush(); return; }
        let m=t.match(/^\*\[calling tool:\s*(.+?)\.\.\.\]\*$/);
        if(m){ flush(); html.push(`<span class="tool"><span class="dot"></span>${esc(m[1])}</span>`); return; }
        if(/^_\(.*\)_$/.test(t)){ flush(); html.push(`<div class="note">${esc(t.replace(/^_\(|\)_$/g,''))}</div>`); return; }
        let e=esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
        if(/^[-•]\s+/.test(t)){ bullets.push(e.replace(/^[-•]\s+/,'')); } else { flush(); html.push('<div>'+e+'</div>'); }
      });
      flush(); return html.join('');
    }
    function addUser(text){
      const d=document.createElement('div'); d.className='msg user';
      d.innerHTML=`<div class="bubble">${esc(text)}</div>`; log.appendChild(d); log.scrollTop=1e9;
    }
    function addBot(){
      const d=document.createElement('div'); d.className='msg bot';
      d.innerHTML='<div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>';
      log.appendChild(d); log.scrollTop=1e9; return d.querySelector('.bubble');
    }
    async function send(text){
      const raw=(text??msg.value).trim(); if(!raw) return;
      msg.value=''; autoGrow(); sendBtn.disabled=true; addUser(raw);
      const bubble=addBot(); let acc='';
      try{
        const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({message:SHORTCUTS[raw]||raw,session_id:SESSION})});
        const reader=resp.body.getReader(), dec=new TextDecoder();
        while(true){ const {done,value}=await reader.read(); if(done) break;
          acc+=dec.decode(value,{stream:true}); bubble.innerHTML=render(acc)||bubble.innerHTML; log.scrollTop=1e9; }
        if(!acc) bubble.innerHTML='<div class="note">(no response)</div>';
      }catch(e){ bubble.innerHTML='<div class="note">⚠ orchestrator unreachable</div>'; }
      sendBtn.disabled=false; msg.focus();
    }
    function autoGrow(){ msg.style.height='auto'; msg.style.height=Math.max(92,Math.min(msg.scrollHeight,280))+'px'; }
    msg.addEventListener('input',autoGrow);
    sendBtn.onclick=()=>send();
    msg.addEventListener('keydown',e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
    document.getElementById('clear').onclick=async()=>{
      try{ await fetch('/api/history?session_id='+SESSION,{method:'DELETE'}); }catch(e){}
      SESSION='map-'+Math.random().toString(36).slice(2,9); log.innerHTML='';
      addBotNote('New session started. Ask a question or pick a shortcut below.');
    };
    function addBotNote(t){ const d=document.createElement('div'); d.className='msg bot';
      d.innerHTML=`<div class="bubble"><div class="note">${esc(t)}</div></div>`; log.appendChild(d); }

    // expand / collapse chat (persisted)
    const side=document.getElementById('side'), toggleBtn=document.getElementById('toggle');
    function setCollapsed(c){
      side.classList.toggle('chat-collapsed',c);
      toggleBtn.textContent=c?'▸':'▾';
      toggleBtn.title=c?'Expand chat':'Collapse chat';
      try{ localStorage.setItem('oran_chat_collapsed',c?'1':'0'); }catch(e){}
    }
    toggleBtn.onclick=()=>setCollapsed(!side.classList.contains('chat-collapsed'));
    try{ if(localStorage.getItem('oran_chat_collapsed')==='1') setCollapsed(true); }catch(e){}

    // drag-resize the side panel left/right (persisted), then fix map tiles
    const resizer=document.getElementById('resizer');
    (function(){
      try{ const w=localStorage.getItem('oran_side_w'); if(w) side.style.width=w; }catch(e){}
      let dragging=false;
      window.addEventListener('mousemove',e=>{ if(!dragging) return;
        let w=window.innerWidth-e.clientX; w=Math.max(300,Math.min(800,w)); side.style.width=w+'px'; });
      resizer.addEventListener('mousedown',e=>{ dragging=true; resizer.classList.add('drag'); document.body.style.userSelect='none'; e.preventDefault(); });
      window.addEventListener('mouseup',()=>{ if(!dragging) return; dragging=false; resizer.classList.remove('drag');
        document.body.style.userSelect=''; try{ localStorage.setItem('oran_side_w',side.style.width); }catch(e){} map.invalidateSize(); });
    })();

    // shortcut chips
    const chips=document.getElementById('chips');
    Object.keys(SHORTCUTS).forEach(k=>{ const b=document.createElement('button'); b.textContent=k; b.onclick=()=>send(k); chips.appendChild(b); });

    // backend badge
    fetch('/api/orch-health').then(r=>r.json()).then(h=>{
      document.getElementById('be').textContent = h.backend ? `· ${h.backend} (${h.model})` : '';
    }).catch(()=>{ document.getElementById('be').textContent='· offline'; });

    addBotNote('Hi — I can query and modify the live network. Try a shortcut or ask in plain English.');
    refresh(); setInterval(refresh,30000);
  </script>
</body>
</html>
